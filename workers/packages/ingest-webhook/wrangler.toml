name = "log-cannon-ingest-webhook"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# Uncomment and set your routes:
# routes = [
#   { pattern = "logs.example.com/ingest/webhook*", zone_name = "example.com" },
# ]

[[queues.producers]]
queue = "log-cannon-ingest"
binding = "INGEST_QUEUE"

[[kv_namespaces]]
binding = "API_KEYS"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
DISCOVERY_MODE = "false"
