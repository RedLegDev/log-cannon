name = "log-cannon-ingest"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# Uncomment and configure your routes:
# routes = [
#   { pattern = "logs.example.com/ingest/*", zone_name = "example.com" },
#   { pattern = "logs.example.com/api/events/raw", zone_name = "example.com" },
#   { pattern = "logs.example.com/v1/*", zone_name = "example.com" },
# ]

[[queues.producers]]
queue = "log-cannon-ingest"
binding = "INGEST_QUEUE"

[[kv_namespaces]]
binding = "API_KEYS"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
DISCOVERY_MODE = "true"
