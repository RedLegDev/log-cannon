name = "log-cannon-ingest"
main = "src/index.ts"
compatibility_date = "2024-12-30"

routes = [
  { pattern = "logs.redleg.dev/v1/logs", zone_name = "redleg.dev" },
  { pattern = "logs.redleg.dev/v1/traces", zone_name = "redleg.dev" },
  { pattern = "logs.redleg.dev/ingest/otlp/*", zone_name = "redleg.dev" },
]

[[queues.producers]]
queue = "log-cannon-ingest"
binding = "INGEST_QUEUE"

[[kv_namespaces]]
binding = "API_KEYS"
id = "3cdaa6591a6e415488072c7094cf3c36"

[vars]
DISCOVERY_MODE = "true"
