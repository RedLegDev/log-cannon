name = "log-cannon-ingest"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# Replace yourdomain.com with the zone that fronts your ingest hostname.
routes = [
  { pattern = "logs.yourdomain.com/v1/logs", zone_name = "yourdomain.com" },
  { pattern = "logs.yourdomain.com/v1/traces", zone_name = "yourdomain.com" },
  { pattern = "logs.yourdomain.com/ingest/otlp/*", zone_name = "yourdomain.com" },
  { pattern = "logs.yourdomain.com/ingest/webhook", zone_name = "yourdomain.com" },
  { pattern = "logs.yourdomain.com/ingest/clef", zone_name = "yourdomain.com" },
  { pattern = "logs.yourdomain.com/api/events/raw", zone_name = "yourdomain.com" },
]

[[queues.producers]]
queue = "log-cannon-ingest"
binding = "INGEST_QUEUE"

[[kv_namespaces]]
binding = "API_KEYS"
# Create with: wrangler kv namespace create API_KEYS — then paste the id here.
id = "<your-kv-namespace-id>"

[vars]
DISCOVERY_MODE = "true"
