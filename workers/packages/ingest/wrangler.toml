name = "log-cannon-ingest"
main = "src/index.ts"
compatibility_date = "2024-12-30"

routes = [
  { pattern = "logs.redleg.dev/v1/logs", zone_name = "redleg.dev" },
  { pattern = "logs.redleg.dev/v1/traces", zone_name = "redleg.dev" },
  { pattern = "logs.redleg.dev/ingest/otlp/*", zone_name = "redleg.dev" },
  { pattern = "logs.redleg.dev/ingest/webhook", zone_name = "redleg.dev" },
  { pattern = "logs.redleg.dev/ingest/clef", zone_name = "redleg.dev" },
  { pattern = "logs.redleg.dev/api/events/raw", zone_name = "redleg.dev" },
]

[[queues.producers]]
queue = "log-cannon-ingest"
binding = "INGEST_QUEUE"

[[kv_namespaces]]
binding = "API_KEYS"
# Create with: wrangler kv namespace create API_KEYS — then paste the id here.
id = "<your-kv-namespace-id>"

[vars]
DISCOVERY_MODE = "true"
