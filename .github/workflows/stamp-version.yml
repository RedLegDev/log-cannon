name: Stamp build version

# Portainer git-polls this repo and rebuilds the dashboard image without a .git
# dir, so the build can't read the commit/branch itself. Instead, on every push
# to main we write the commit metadata into the git-tracked version.json and
# commit it back. Portainer then pulls that file on its next poll and the System
# page shows the real commit and branch (build time is stamped in the image).

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  stamp:
    # Skip the bot's own stamp commit so we don't loop. (GitHub also honours the
    # "[skip ci]" tag in that commit message, but guard explicitly too.)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write version.json
        run: |
          commit="${{ github.sha }}"
          short="${commit:0:7}"
          branch="${{ github.ref_name }}"
          cdate="$(git show -s --format=%cI "$commit")"
          cat > dashboard/src/generated/version.json <<EOF
          {
            "commit": "$short",
            "commitFull": "$commit",
            "commitDate": "$cdate",
            "buildTime": null,
            "branch": "$branch"
          }
          EOF
          cat dashboard/src/generated/version.json

      - name: Commit if changed
        run: |
          if git diff --quiet -- dashboard/src/generated/version.json; then
            echo "version.json unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/src/generated/version.json
          git commit -m "chore(dashboard): stamp build version ${{ github.sha }} [skip ci]"
          git push
