<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Cannon Icon -->
  <g>
    <!-- Cannon barrel -->
    <rect x="8" y="16" width="28" height="16" rx="2" fill="#FF4D2A"/>
    <!-- Cannon base/wheel -->
    <circle cx="16" cy="32" r="6" fill="#2A2A2F" stroke="#FF4D2A" stroke-width="2"/>
    <!-- Data stream lines -->
    <rect x="40" y="18" width="12" height="3" rx="1.5" fill="#FF4D2A" opacity="0.9"/>
    <rect x="44" y="23" width="16" height="3" rx="1.5" fill="#FF4D2A" opacity="0.7"/>
    <rect x="40" y="28" width="10" height="3" rx="1.5" fill="#FF4D2A" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="68" y="32" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" fill="#F9FAFB" letter-spacing="-0.02em">
    LOG CANNON
  </text>
</svg>
