<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0A0A0B"/>

  <!-- Cannon barrel -->
  <rect x="12" y="24" width="24" height="16" rx="3" fill="#FF4D2A"/>

  <!-- Cannon base/wheel -->
  <circle cx="20" cy="40" r="7" fill="#141416" stroke="#FF4D2A" stroke-width="2.5"/>
  <circle cx="20" cy="40" r="2" fill="#FF4D2A"/>

  <!-- Data stream lines (logs firing) -->
  <rect x="40" y="26" width="14" height="4" rx="2" fill="#FF4D2A">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="44" y="32" width="12" height="4" rx="2" fill="#FF6B47">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="40" y="38" width="10" height="4" rx="2" fill="#FF8A65">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Muzzle flash effect -->
  <circle cx="36" cy="32" r="3" fill="#FF4D2A" opacity="0.6"/>
</svg>
