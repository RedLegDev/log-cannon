services:
  clickhouse:
    build: ./clickhouse
    expose:
      - "8123"
      - "9000"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-backups:/backups
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    expose:
      - "3000"
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ALERT_FROM_EMAIL=${ALERT_FROM_EMAIL:-alerts@redleg.dev}
      - DASHBOARD_URL=${DASHBOARD_URL:-https://logs.redleg.dev}
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  alert-worker:
    build: ./alert-worker
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_DATABASE=logs
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ALERT_FROM_EMAIL=${ALERT_FROM_EMAIL:-alerts@redleg.dev}
      - DASHBOARD_URL=${DASHBOARD_URL:-https://logs.redleg.dev}
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  backup:
    build: ./backup
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - BACKUP_CRON=${BACKUP_CRON:-0 3,15 * * *}
      - BACKUP_RETAIN_LOCAL=${BACKUP_RETAIN_LOCAL:-7}
      - BACKUP_RETAIN_OFFSITE=${BACKUP_RETAIN_OFFSITE:-14}
      - BACKUP_FULL_SCHEDULE=${BACKUP_FULL_SCHEDULE:-0}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET=${R2_BUCKET:-log-cannon-backups}
    volumes:
      - clickhouse-backups:/backups
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  queue-consumer:
    build: ./queue-consumer
    environment:
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CF_QUEUE_ID=${CF_QUEUE_ID}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_DATABASE=logs
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  clickhouse-ui:
    image: ghcr.io/caioricciuti/ch-ui:latest
    ports:
      - "${CLICKHOUSE_UI_PORT:-5521}:5521"
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  clickhouse-data:
  clickhouse-backups:
