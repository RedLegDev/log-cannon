services:
  clickhouse-init:
    image: curlimages/curl:latest
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./clickhouse/init:/init:ro
    entrypoint: ["/bin/sh", "-c", "cat /init/001_schema.sql | curl -s --fail -X POST 'http://clickhouse:8123/?multiquery=1' --data-binary @-"]
    restart: "no"

  ingest-api:
    build: ./ingest-api
    expose:
      - "8080"
    ports:
      - "${INGEST_PORT:-8080}:8080"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_DATABASE=logs
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    expose:
      - "8123"
      - "9000"
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    expose:
      - "3000"
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
    restart: unless-stopped

  alert-worker:
    build: ./alert-worker
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_DATABASE=logs
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ALERT_FROM_EMAIL=${ALERT_FROM_EMAIL:-alerts@yourdomain.com}
    volumes:
      - ./alert-worker/alerts.json:/app/alerts.json:ro
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  clickhouse-data:
